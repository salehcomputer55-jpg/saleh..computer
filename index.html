<title>সালেহ কম্পিউটার - ডিজিটাল হিসাবের খাতা</title>
<!-- iPhone / Safari এ ঠিকভাবে খোলা ও হোম স্ক্রিনে যোগ করার জন্য -->

<meta name="mobile-web-app-capable" content="yes">

<style>
  :root {
    --primary: #1d4ed8;
    --primary-dark: #1e3a8a;
    --primary-light: #3b82f6;
    --secondary: #d97706;
    --accent-gold: #fbbf24;
    --success: #059669;
    --warning: #d97706;
    --danger: #dc2626;
    --dark: #0f172a;
    --gray: #64748b;
    --light: #f8fafc;
    --white: #ffffff;
    --gradient-primary: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
    --gradient-sidebar: linear-gradient(165deg, #451a03 0%, #78350f 45%, #b45309 100%);
    --gradient-success: linear-gradient(135deg, #059669 0%, #10b981 100%);
    --gradient-danger: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
    --gradient-gold: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
    --shadow: 0 10px 30px rgba(15,23,42,0.08);
    --shadow-lg: 0 20px 45px rgba(15,23,42,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Hind Siliguri', 'Poppins', sans-serif;
    background: linear-gradient(135deg, #f8fafc 0%, #eef1f6 100%);
    color: var(--dark);
    overflow-x: hidden;
  }
  h1, h2, h3 { font-family: 'Manrope', 'Hind Siliguri', sans-serif; }

  /* LOADING */
  .loading-overlay {
    position: fixed; inset: 0;
    background: var(--gradient-sidebar);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999; color: var(--white);
    transition: opacity 0.4s;
  }
  .loading-overlay.hidden { display: none !important; }
  .logo-spinner { width: 110px; height: 110px; margin-bottom: 28px; position: relative; }
  .logo-spinner svg { width: 100%; height: 100%; animation: spin 2.5s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-icon-center {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .loading-text { font-size: 17px; font-weight: 600; margin-bottom: 8px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }

  /* APP */
  .app { display: grid; grid-template-columns: 270px 1fr; min-height: 100vh; min-height: 100dvh; }
  .app.hidden { display: none !important; }

  /* SIDEBAR */
  .sidebar {
    background: var(--gradient-sidebar);
    padding: calc(28px + env(safe-area-inset-top)) 18px calc(28px + env(safe-area-inset-bottom)) calc(18px + env(safe-area-inset-left));
    display: flex; flex-direction: column;
    box-shadow: var(--shadow-lg);
    position: relative; overflow-y: auto; color: var(--white);
    border-right: 1px solid rgba(242,181,68,0.15);
  }
  .sidebar::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at top right, rgba(251,191,36,0.18), transparent 60%);
    pointer-events: none;
  }
  .sidebar::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: var(--gradient-gold);
  }
  .logo-section { display: flex; align-items: center; gap: 14px; margin-bottom: 36px; position: relative; z-index: 1; }
  .logo-badge {
    width: 48px; height: 48px;
    background: var(--gradient-gold); border-radius: 12px;
    display: flex; align-items: center; justify-content: center; font-size: 26px;
    box-shadow: 0 6px 16px rgba(242,181,68,0.35);
  }
  .logo-text h1 { font-size: 18px; font-weight: 800; margin: 0; }
  .logo-text p { font-size: 10px; opacity: 0.6; margin: 4px 0 0; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
  .nav-menu { display: flex; flex-direction: column; gap: 6px; flex: 1; position: relative; z-index: 1; }
  .nav-item {
    padding: 11px 15px; border-radius: 10px; cursor: pointer;
    transition: all 0.2s ease; display: flex; align-items: center; gap: 11px;
    font-weight: 600; font-size: 14px; color: rgba(255,255,255,0.6);
    border-left: 3px solid transparent; user-select: none;
  }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: var(--white); }
  .nav-item.active { background: rgba(255,255,255,0.16); color: #fff7ed; border-left-color: var(--accent-gold); }
  .nav-icon { font-size: 19px; width: 22px; text-align: center; }
  .sidebar-footer { position: relative; z-index: 1; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 11px; opacity: 0.5; line-height: 1.8; }
  .install-btn {
    display: flex; width: 100%; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 12px; margin-bottom: 13px; border: none; border-radius: 10px;
    background: var(--gradient-gold); color: #451a03; font-weight: 700; font-size: 13px;
    cursor: pointer; font-family: 'Hind Siliguri', sans-serif; opacity: 1;
    box-shadow: 0 4px 12px rgba(242,181,68,0.3); transition: transform 0.2s;
  }
  .install-btn:hover { transform: translateY(-2px); }
  .user-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(242,181,68,0.2); padding: 11px 13px; border-radius: 10px; margin-bottom: 13px; font-size: 13px; }
  .user-card strong { display: block; margin-bottom: 7px; color: var(--white); }
  .logout-btn { color: var(--accent-gold); cursor: pointer; opacity: 0.85; transition: opacity 0.2s; font-weight: 600; }
  .logout-btn:hover { opacity: 1; }

  /* MAIN */
  .main { padding: calc(36px + env(safe-area-inset-top)) calc(44px + env(safe-area-inset-right)) calc(36px + env(safe-area-inset-bottom)) 44px; overflow-y: auto; background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%); }
  .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 36px; flex-wrap: wrap; gap: 16px; }
  .header-content h1 { font-size: 32px; font-weight: 800; margin-bottom: 6px; color: var(--dark); }
  .header-date { color: var(--gray); font-size: 13px; }

  /* CARDS */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 18px; margin-bottom: 36px; }
  .card {
    background: var(--white); border-radius: 16px; padding: 22px;
    box-shadow: var(--shadow); transition: all 0.3s; border: 1px solid #e5e7eb;
    position: relative; overflow: hidden;
  }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--gradient-primary); }
  .card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }
  .card.success::before { background: var(--gradient-success); }
  .card.warning::before { background: linear-gradient(90deg, var(--warning), #fbbf24); }
  .card.danger::before { background: var(--gradient-danger); }
  .card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--gray); margin-bottom: 8px; font-weight: 600; }
  .card-value { font-size: 28px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }

  /* BUTTONS */
  .btn {
    padding: 11px 22px; border: none; border-radius: 10px; font-size: 13px;
    font-weight: 600; cursor: pointer; transition: all 0.25s;
    display: inline-flex; align-items: center; gap: 7px; font-family: 'Poppins', sans-serif;
  }
  .btn-primary { background: var(--gradient-primary); color: var(--white); box-shadow: 0 4px 12px rgba(29,78,216,0.35); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 7px 18px rgba(29,78,216,0.5); }
  .btn-secondary { background: var(--gradient-success); color: var(--white); }
  .btn-secondary:hover { transform: translateY(-1px); }
  .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
  .btn-outline:hover { background: var(--primary); color: var(--white); }
  .btn-danger { background: var(--danger); color: var(--white); }
  .btn-danger:hover { background: #b91c1c; }
  .btn-small { padding: 6px 11px; font-size: 11px; border-radius: 8px; }

  /* FORMS */
  .panel { background: var(--white); border-radius: 16px; padding: 28px; margin-bottom: 28px; box-shadow: var(--shadow); border: 1px solid #e5e7eb; }
  .panel h2 { font-size: 20px; font-weight: 700; margin-bottom: 22px; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
  .field { display: flex; flex-direction: column; }
  .field label { font-weight: 600; font-size: 12px; color: var(--dark); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
  input, select {
    padding: 11px 14px; border: 2px solid #e5e7eb; border-radius: 10px;
    font-size: 14px; font-family: 'Poppins', sans-serif; transition: all 0.25s; background: var(--white);
    color: var(--dark);
  }
  input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(29,78,216,0.1); }
  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .toggle-btn { padding: 11px; border: 2px solid #e5e7eb; border-radius: 10px; background: var(--white); cursor: pointer; font-weight: 600; transition: all 0.25s; font-size: 13px; }
  .toggle-btn.active { border-color: var(--primary); background: var(--gradient-primary); color: var(--white); }
  .toggle-btn:hover:not(.active) { border-color: #94a3b8; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 28px; right: 28px;
    background: var(--dark); color: var(--white);
    padding: 14px 22px; border-radius: 12px; font-size: 14px; font-weight: 600;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 9998;
    animation: toastIn 0.3s ease; max-width: 320px;
  }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }
  @keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* TABLE */
  .section-title { font-size: 18px; font-weight: 700; margin: 36px 0 16px; color: var(--dark); }
  .table-wrap { border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); }
  table { width: 100%; border-collapse: collapse; background: var(--white); }
  thead th { background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%); padding: 14px 16px; text-align: left; font-weight: 600; color: var(--dark); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  tbody td { padding: 14px 16px; border-bottom: 1px solid #e5e7eb; font-size: 13px; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #f9fafb; }
  .amt { font-weight: 700; font-family: 'JetBrains Mono', monospace; text-align: right; }
  .tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; background: #e5e7eb; color: var(--dark); }
  .tag.success { background: rgba(5,150,105,0.1); color: var(--success); }
  .tag.warning { background: rgba(217,119,6,0.1); color: var(--warning); }

  /* AUTH MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
  .modal-overlay.hidden { display: none !important; }
  .auth-modal { background: var(--white); border-radius: 22px; width: 100%; max-width: 860px; box-shadow: var(--shadow-lg); animation: slideUp 0.35s ease; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; max-height: 94vh; }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .auth-brand-panel { background: var(--gradient-sidebar); color: var(--white); padding: 48px 38px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
  .auth-brand-panel::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 20% 15%, rgba(242,181,68,0.18), transparent 55%); pointer-events: none; }
  .auth-brand-panel > * { position: relative; z-index: 1; }
  .auth-icon-wrap { width: 58px; height: 58px; border-radius: 15px; background: rgba(242,181,68,0.14); border: 1px solid rgba(242,181,68,0.35); display: flex; align-items: center; justify-content: center; margin-bottom: 18px; }
  .auth-icon-wrap svg { width: 30px; height: 30px; }
  .auth-brand-title { font-size: 24px; font-weight: 800; margin-bottom: 10px; }
  .auth-brand-sub { font-size: 13px; opacity: 0.65; line-height: 1.7; margin-bottom: 30px; }
  .auth-brand-features { display: flex; flex-direction: column; gap: 13px; }
  .auth-brand-feature { display: flex; align-items: center; gap: 11px; font-size: 13px; color: rgba(255,255,255,0.85); }
  .auth-brand-feature .dot { width: 28px; height: 28px; border-radius: 8px; background: rgba(242,181,68,0.15); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .auth-form-panel { padding: 48px 42px; overflow-y: auto; display: flex; flex-direction: column; justify-content: center; }
  .auth-logo h2 { font-size: 22px; font-weight: 800; margin-bottom: 5px; color: var(--dark); }
  .auth-logo p { color: var(--gray); font-size: 13px; margin-bottom: 24px; }
  .auth-field { margin-bottom: 14px; }
  .auth-field label { display: block; font-size: 12px; font-weight: 700; color: var(--dark); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
  .auth-error { background: rgba(220,38,38,0.08); color: var(--danger); padding: 11px; border-radius: 10px; margin-bottom: 14px; font-size: 13px; border: 1px solid rgba(220,38,38,0.2); }
  .auth-success { background: rgba(5,150,105,0.08); color: var(--success); padding: 11px; border-radius: 10px; margin-bottom: 14px; font-size: 13px; border: 1px solid rgba(5,150,105,0.2); }
  .auth-hint { font-size: 11.5px; color: var(--gray); margin-top: 18px; line-height: 1.6; text-align: center; }
  .auth-link { font-size: 12px; color: var(--primary); cursor: pointer; font-weight: 600; }
  .auth-link:hover { text-decoration: underline; }
  .auth-back { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--gray); cursor: pointer; font-weight: 600; margin-bottom: 16px; }
  .auth-back:hover { color: var(--dark); }

  /* TABS */
  .tab-buttons { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .tab-btn { padding: 8px 15px; border-radius: 8px; border: 2px solid var(--primary); background: transparent; color: var(--primary); cursor: pointer; font-weight: 600; font-size: 12px; transition: all 0.25s; }
  .tab-btn.active { background: var(--gradient-primary); color: var(--white); border-color: var(--primary); }
  .tab-btn:hover:not(.active) { background: rgba(29,78,216,0.06); }

  /* EMPTY */
  .empty-state { text-align: center; padding: 55px 20px; color: var(--gray); }
  .empty-icon { font-size: 55px; margin-bottom: 16px; opacity: 0.45; }

  /* REPORT */
  .summary-strip { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 22px; }
  .summary-chip { flex: 1; min-width: 150px; background: var(--white); border: 1px solid #e5e7eb; border-radius: 14px; padding: 16px 18px; box-shadow: var(--shadow); }
  .summary-chip .card-label { margin-bottom: 5px; }
  .summary-chip .card-value { font-size: 22px; }
  .day-group-header td { background: linear-gradient(135deg, #eef2ff 0%, #ede9fe 100%); font-weight: 700; font-size: 12px; color: var(--primary-dark); padding: 9px 16px; }

  @media print {
    .sidebar, .page-header .btn, .tab-buttons, .panel, .logout-btn { display: none !important; }
    .app { display: block !important; grid-template-columns: 1fr !important; }
    .main { padding: 0 !important; }
    body { background: var(--white) !important; }
    .letterhead { display: flex !important; align-items: center; gap: 14px; border-bottom: 3px solid var(--primary); padding-bottom: 14px; margin-bottom: 22px; }
  }
  .letterhead { display: none; }

  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { padding: calc(14px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) 14px calc(14px + env(safe-area-inset-left)); flex-direction: row; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .logo-section { margin-bottom: 0; }
    .nav-menu { flex-direction: row; gap: 3px; }
    .nav-item { white-space: nowrap; padding: 9px 11px; }
    .sidebar-footer { display: none; }
    .main { padding: 16px calc(16px + env(safe-area-inset-right)) calc(16px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left)); }
    .auth-modal { grid-template-columns: 1fr; max-height: 92dvh; }
    .auth-brand-panel { display: none; }
    .auth-form-panel { padding: 34px 24px; }
    input, select, .btn { font-size: 16px; }
  }
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

        </svg>
      </div>
      <div class="logo-text">

<script>
// ============================================================
// CONFIG & CONSTANTS
// ============================================================
const APP_NS = 'saleh-ledger-v3';

const SERVICES = [
  'ছবি তোলা','জন্ম নিবন্ধন','ভোটার আইডি কার্ড','কালার প্রিন্ট',
  'সাদাকালো প্রিন্ট','খাজনার আবেদন','ফটোকপি','স্কুল/কলেজ বেতন জমা',
  'বাংলা/ইংলিশ টাইপ','অনলাইন আবেদন','লেমিনেটিং','বিল রিচার্জ','অন্যান্য'
];

// ============================================================
// APP STATE — single source of truth
// ============================================================
let APP = {
  authenticated: false,
  currentUser: '',
  authRecord: null,      // { username, hash, answerHash }
  state: {              // user data
    accounts: [],
    transactions: [],
    dues: [],
    bkash: []
  },
  view: 'dashboard',
  txType: 'income',
  bkTxType: 'income',
  txViewMode: 'all',
  reportMonth: new Date().toISOString().slice(0,7)
};

// ============================================================
// ☁️ CLOUD SYNC (Firebase) — একই ID/পাসওয়ার্ড দিয়ে সব ডিভাইস থেকে
// একই ডাটা দেখতে/এডিট করতে এই কনফিগটা পূরণ করুন।
// Firebase Console > Project settings > Your apps > Web app থেকে
// এই মানগুলো কপি করে নিচে বসান।
// ============================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB4i4sxxti4L5Leuvrk8Fku8iWkO9R7RpM",
  authDomain: "saleg-2b09d.firebaseapp.com",
  projectId: "saleg-2b09d",
  storageBucket: "saleg-2b09d.firebasestorage.app",
  messagingSenderId: "577305283426",
  appId: "1:577305283426:web:34b0280e6567ceccd7fa3b"
};

let CLOUD_ENABLED = false;
let db = null;
let cloudUnsub = null;
let suppressNextSnapshot = false;
let cloudSaveTimer = null;
let lastCloudWriteAt = 0;

function initCloud() {
  const configured = FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== 'YOUR_API_KEY';
  if(!configured || typeof firebase === 'undefined') { CLOUD_ENABLED = false; return; }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    CLOUD_ENABLED = true;
  } catch(e) {
    console.error('Firebase init failed', e);
    CLOUD_ENABLED = false;
  }
}

function docIdFor(username) {
  return String(username || '').trim().toLowerCase().replace(/[^a-z0-9_.-]/g, '_');
}

async function cloudGetUser(username) {
  if(!CLOUD_ENABLED) return null;
  try {
    const snap = await db.collection('ledger_users').doc(docIdFor(username)).get();
    return snap.exists ? snap.data() : null;
  } catch(e) { console.error('cloudGetUser failed', e); return null; }
}

async function cloudCreateUser(username, hash, answerHash, state) {
  if(!CLOUD_ENABLED) return false;
  try {
    await db.collection('ledger_users').doc(docIdFor(username)).set({
      username, hash, answerHash, state, updatedAt: Date.now()
    });
    return true;
  } catch(e) { console.error('cloudCreateUser failed', e); return false; }
}

async function cloudSaveState() {
  if(!CLOUD_ENABLED || !APP.currentUser) return;
  try {
    const ts = Date.now();
    suppressNextSnapshot = true;
    lastCloudWriteAt = ts;
    await db.collection('ledger_users').doc(docIdFor(APP.currentUser)).set(
      { state: APP.state, updatedAt: ts }, { merge: true }
    );
  } catch(e) {
    console.error('cloudSaveState failed', e);
    showToast('ইন্টারনেট সংযোগ সমস্যা — ডাটা শুধু এই ডিভাইসে সেভ হয়েছে', 'error');
  }
}

async function cloudUpdateHash(newHash, username = '') {
  if(!CLOUD_ENABLED) return;
  const uname = username || APP.currentUser;
  if(!uname) return;
  try {
    await db.collection('ledger_users').doc(docIdFor(uname)).set({ hash: newHash }, { merge: true });
  } catch(e) { console.error('cloudUpdateHash failed', e); }
}

function cloudListen() {
  if(!CLOUD_ENABLED || !APP.currentUser) return;
  if(cloudUnsub) { cloudUnsub(); cloudUnsub = null; }
  cloudUnsub = db.collection('ledger_users').doc(docIdFor(APP.currentUser)).onSnapshot(doc => {
    if(suppressNextSnapshot) { suppressNextSnapshot = false; return; }
    if(!doc.exists) return;
    const data = doc.data();
    // দ্রুত tarikh-চেক: নিজের করা সেভ বা পুরোনো ডাটা হলে ভারী deep-compare না করে বাদ দাও
    if(!data.state || (data.updatedAt && data.updatedAt <= lastCloudWriteAt)) return;
    APP.state = data.state;
    if(!APP.state.bkash) APP.state.bkash = [];
    if(!APP.state.dues) APP.state.dues = [];
    persist('data', APP.state, APP.currentUser);
    showToast('📱 অন্য ডিভাইস থেকে নতুন আপডেট এসেছে', 'success');
    render();
  }, err => console.error('cloud listen error', err));
}

function cloudStop() {
  if(cloudUnsub) { cloudUnsub(); cloudUnsub = null; }
}

// ============================================================
// STORAGE HELPERS
// ============================================================
function storageKey(key, username) {
  return username
    ? `${APP_NS}:user:${username}:${key}`
    : `${APP_NS}:${key}`;
}

function persist(key, value, username = '') {
  try {
    localStorage.setItem(storageKey(key, username), JSON.stringify(value));
    return true;
  } catch(e) { console.error('persist error', e); return false; }
}

function retrieve(key, fallback = null, username = '') {
  try {
    const raw = localStorage.getItem(storageKey(key, username));
    return raw !== null ? JSON.parse(raw) : fallback;
  } catch(e) { return fallback; }
}

function saveAuth() { persist('auth', APP.authRecord); }
function loadAuth() { APP.authRecord = retrieve('auth'); }

function saveUserData() {
  if(!APP.currentUser) { console.warn('saveUserData: no user'); return false; }
  const ok = persist('data', APP.state, APP.currentUser);
  if(!ok) showToast('ডাটা সংরক্ষণে সমস্যা হয়েছে', 'error');
  if(CLOUD_ENABLED) {
    // একসাথে কয়েকটা এন্ট্রি করলে প্রতিবার আলাদা করে সার্ভারে না পাঠিয়ে
    // অল্প সময় অপেক্ষা করে একবারে পাঠানো হয় — এতে অ্যাপ দ্রুত মনে হবে
    clearTimeout(cloudSaveTimer);
    cloudSaveTimer = setTimeout(() => { cloudSaveTimer = null; cloudSaveState(); }, 900);
  }
  return ok;
}

function flushCloudSave() {
  if(cloudSaveTimer) {
    clearTimeout(cloudSaveTimer);
    cloudSaveTimer = null;
    cloudSaveState();
  }
}

function loadUserData() {
  if(!APP.currentUser) return;
  const defaultState = {
    accounts: [{ id: uid(), name: 'ক্যাশ কাউন্টার', type: 'নগদ', opening: 0 }],
    transactions: [],
    dues: [],
    bkash: []
  };
  APP.state = retrieve('data', defaultState, APP.currentUser);
  if(!APP.state.dues) APP.state.dues = [];
  if(!APP.state.accounts) APP.state.accounts = defaultState.accounts;
  if(!APP.state.transactions) APP.state.transactions = [];
  if(!APP.state.bkash) APP.state.bkash = [];
}

// ============================================================
// UTILITIES
// ============================================================
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const todayStr = () => new Date().toISOString().slice(0,10);
const nowTimeStr = () => { const d = new Date(); return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); };
function formatTime12(timeStr) {
  if(!timeStr) return '';
  const parts = String(timeStr).split(':');
  let h = parseInt(parts[0], 10);
  const m = (parts[1] || '00').padStart(2,'0');
  if(isNaN(h)) return escapeHtml(timeStr);
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12;
  if(h === 0) h = 12;
  return `${String(h).padStart(2,'0')}:${m} ${ampm}`;
}
const thisMonth = () => new Date().toISOString().slice(0,7);
const fmt = n => '৳' + Number(n||0).toLocaleString('en-BD', {minimumFractionDigits:2, maximumFractionDigits:2});

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showToast(msg, type = 'success') {
  const existing = document.querySelector('.toast');
  if(existing) existing.remove();
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ============================================================
// CALCULATIONS
// ============================================================
function acctBalance(acctId) {
  const acct = APP.state.accounts.find(a => a.id === acctId);
  if(!acct) return 0;
  let bal = Number(acct.opening) || 0;
  APP.state.transactions.forEach(t => {
    if(t.accountId !== acctId) return;
    bal += t.type === 'income' ? Number(t.amount) : -Number(t.amount);
  });
  return bal;
}
function isBkashAcct(acctId) {
  const acct = APP.state.accounts.find(a => a.id === acctId);
  return !!(acct && acct.name.trim() === 'বিকাশ');
}
function totalBalance() { return APP.state.accounts.filter(a => a.name.trim() !== 'বিকাশ').reduce((s,a) => s + acctBalance(a.id), 0); }
function totalIncome() { return APP.state.transactions.filter(t=>t.type==='income' && !isBkashAcct(t.accountId)).reduce((s,t)=>s+Number(t.amount),0); }
function totalExpense() { return APP.state.transactions.filter(t=>t.type==='expense' && !isBkashAcct(t.accountId)).reduce((s,t)=>s+Number(t.amount),0); }
function acctName(id) { const a = APP.state.accounts.find(x=>x.id===id); return a ? a.name : '—'; }
function duePaid(d) { return (d.paidEntries||[]).reduce((s,p)=>s+Number(p.amount),0); }
function dueRemaining(d) { return Math.max(0, Number(d.total) - duePaid(d)); }
function totalDue() { return APP.state.dues.reduce((s,d)=>s+dueRemaining(d),0); }

function periodStats(txList) {
  const income = txList.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0);
  const expense = txList.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);
  return { income, expense, balance: income - expense };
}

// ============================================================
// WHATSAPP
// ============================================================
function toWaNum(phone) {
  let n = String(phone||'').replace(/[^0-9]/g,'');
  if(n.startsWith('880')) return n;
  if(n.startsWith('0')) return '880' + n.slice(1);
  if(n.length === 10) return '880' + n;
  return n;
}
function sendWhatsApp(d) {
  if(!d || !d.phone) return;
  const rem = dueRemaining(d);
  const paid = duePaid(d);
  const dateBn = d.date || todayStr();
  const lines = [
    `প্রিয় ${d.customer},`,
    ``,
    `সালেহ কম্পিউটার থেকে আপনার হিসাবের একটি সংক্ষিপ্ত বিবরণ:`,
    ``,
    `📌 সেবা/পণ্য: ${d.service || '—'}`,
    `📅 তারিখ: ${dateBn}`,
    `💰 মোট বিল: ${fmt(d.total)}`,
    `✅ পরিশোধিত: ${fmt(paid)}`,
    `⏳ বাকি আছে: ${fmt(rem)}`,
    ``,
    `অনুগ্রহ করে সুবিধাজনক সময়ে বাকি টাকাটি পরিশোধ করবেন। কোনো ভুল হলে বা প্রশ্ন থাকলে এই নাম্বারেই যোগাযোগ করুন।`,
    ``,
    `ধন্যবাদান্তে,`,
    `সালেহ কম্পিউটার`
  ];
  const msg = lines.join('\n');
  window.open(`https://wa.me/${toWaNum(d.phone)}?text=${encodeURIComponent(msg)}`, '_blank');
}

      ${(APP.authRecord || CLOUD_ENABLED) ? `<div class="auth-hint" style="margin-top:10px;">আগে থেকে খাতা আছে? <span class="auth-link" id="s-to-login">সাইন ইন করুন</span></div>` : ''}

  if(APP.authRecord || CLOUD_ENABLED) {

    if(pass.length < 4) return showSetup('পাসওয়ার্ড কমপক্ষে ৪ অক্ষর');
    if(pass !== pass2) return showSetup('পাসওয়ার্ড মিলছে না');
    if(!ans) return showSetup('নিরাপত্তা উত্তর লিখুন');
    const btn = document.getElementById('s-btn');
    btn.disabled = true; btn.textContent = 'তৈরি হচ্ছে...';
    let existingCloudUser = CLOUD_ENABLED ? await cloudGetUser(user) : null;
    if((APP.authRecord || existingCloudUser) && !confirm('আগের খাতা ও সব ডাটা মুছে গিয়ে নতুন খাতা তৈরি হবে (এবং সব ডিভাইসে এটাই প্রযোজ্য হবে)। এগিয়ে যাবেন?')) {

      <div class="auth-hint" style="margin-top:10px;">নতুন খাতা তৈরি করতে চান? <span class="auth-link" id="l-to-signup">সাইন আপ করুন</span></div>

    const btn = document.getElementById('l-btn');
    btn.disabled = true; btn.textContent = 'যাচাই হচ্ছে...';
    const hash = await sha256(pass);
    let record = APP.authRecord;
    let cloudUser = null;
    if(CLOUD_ENABLED) {
      cloudUser = await cloudGetUser(user);
      if(cloudUser) record = cloudUser;
    }
    if(record && user === record.username && hash === record.hash) {
      APP.authRecord = { username: record.username, hash: record.hash, answerHash: record.answerHash };
      saveAuth();
      APP.currentUser = user;
      APP.authenticated = true;
      if(cloudUser && cloudUser.state) {
        APP.state = cloudUser.state;
        if(!APP.state.bkash) APP.state.bkash = [];
        if(!APP.state.dues) APP.state.dues = [];
        persist('data', APP.state, APP.currentUser);
      } else {
        loadUserData();
      }
      if(CLOUD_ENABLED) cloudListen();
      closeAuthModal();
      showAppUI();
      render();
    } else {
      btn.disabled = false; btn.textContent = 'সাইন ইন করুন ✓';
      showLogin('আইডি বা পাসওয়ার্ড ভুল');
    }
  };
  document.getElementById('l-btn').addEventListener('click', doLogin);
  document.getElementById('l-pass').addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });
  document.getElementById('l-forgot').addEventListener('click', () => showForgot());
  document.getElementById('l-to-signup').addEventListener('click', () => showSetup());
}

function showForgot(step = 1, err = '', verifiedUser = '') {
  if(!APP.authRecord?.answerHash && !CLOUD_ENABLED) {
    openAuthModal(`${brandPanel()}
      <div class="auth-form-panel">
        <span class="auth-back" id="fb-back">← ফিরুন</span>
        <div class="auth-logo"><h2>রিসেট সম্ভব নয়</h2><p>নিরাপত্তা উত্তর সেট নেই</p></div>
        <div class="auth-error">❌ সরাসরি পাসওয়ার্ড দিয়ে সাইন ইন করুন।</div>
      </div>`);
    document.getElementById('fb-back').addEventListener('click', () => showLogin());
    return;
  }
  if(step === 1) {
    openAuthModal(`${brandPanel()}
      <div class="auth-form-panel">
        <span class="auth-back" id="fb-back">← সাইন ইন-এ ফিরুন</span>
        <div class="auth-logo"><h2>পাসওয়ার্ড ভুলেছেন?</h2><p>নিরাপত্তা উত্তর দিয়ে যাচাই করুন</p></div>
        ${err ? `<div class="auth-error">❌ ${escapeHtml(err)}</div>` : ''}
        <div class="auth-field"><label>ইউজার আইডি</label><input type="text" id="f-user" autocomplete="off"></div>
        <div class="auth-field"><label>নিরাপত্তা উত্তর</label><input type="text" id="f-ans" autocomplete="off"></div>
        <button class="btn btn-primary" id="f-btn" style="width:100%;">যাচাই করুন ✓</button>
      </div>`);
    document.getElementById('fb-back').addEventListener('click', () => showLogin());
    document.getElementById('f-btn').addEventListener('click', async () => {
      const user = document.getElementById('f-user').value.trim();
      const ans = document.getElementById('f-ans').value.trim();
      if(!user || !ans) return showForgot(1, 'আইডি ও উত্তর দুটোই লিখুন');
      const h = await sha256(ans.toLowerCase());
      let record = APP.authRecord;
      if(CLOUD_ENABLED) {
        const cloudUser = await cloudGetUser(user);
        if(cloudUser) record = cloudUser;
      }
      if(!record || user !== record.username || h !== record.answerHash)
        return showForgot(1, 'আইডি বা নিরাপত্তা উত্তর ভুল');
      showForgot(2, '', user);
    });
  } else {
    openAuthModal(`${brandPanel()}
      <div class="auth-form-panel">
        <span class="auth-back" id="fb-back">← সাইন ইন-এ ফিরুন</span>
        <div class="auth-logo"><h2>নতুন পাসওয়ার্ড</h2><p>যাচাই সম্পন্ন</p></div>
        ${err ? `<div class="auth-error">❌ ${escapeHtml(err)}</div>` : ''}
        <div class="auth-field"><label>নতুন পাসওয়ার্ড</label><input type="password" id="f-np"></div>
        <div class="auth-field"><label>নিশ্চিত করুন</label><input type="password" id="f-np2"></div>
        <button class="btn btn-primary" id="f-save" style="width:100%;">সংরক্ষণ করুন ✓</button>
      </div>`);
    document.getElementById('fb-back').addEventListener('click', () => showLogin());
    document.getElementById('f-save').addEventListener('click', async () => {
      const p1 = document.getElementById('f-np').value;
      const p2 = document.getElementById('f-np2').value;
      if(p1.length < 4) return showForgot(2, 'পাসওয়ার্ড কমপক্ষে ৪ অক্ষর', verifiedUser);
      if(p1 !== p2) return showForgot(2, 'পাসওয়ার্ড মিলছে না', verifiedUser);
      const newHash = await sha256(p1);
      if(APP.authRecord) { APP.authRecord.hash = newHash; saveAuth(); }
      if(CLOUD_ENABLED) await cloudUpdateHash(newHash, verifiedUser);
      showLogin();
      setTimeout(() => {
        const fp = document.querySelector('#authContent .auth-form-panel');
        if(fp) fp.insertAdjacentHTML('afterbegin', '<div class="auth-success">✓ পাসওয়ার্ড পরিবর্তন হয়েছে</div>');
      }, 50);
    });
  }
}

function logout() {
  flushCloudSave();
  cloudStop();
  APP.authenticated = false;
  APP.currentUser = '';
  APP.state = { accounts: [], transactions: [], dues: [], bkash: [] };
  document.getElementById('app').classList.add('hidden');
  showLogin();
}

function showAppUI() {
  document.getElementById('app').classList.remove('hidden');
}

function render() {
  // Update nav
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === APP.view);
  });
  // User card
  const uc = document.getElementById('userCard');
  if(APP.authRecord) {
    const syncBadge = CLOUD_ENABLED
      ? `<div style="font-size:10px;opacity:0.75;margin-top:3px;">☁️ সব ডিভাইসে সিঙ্ক চালু</div>`
      : `<div style="font-size:10px;opacity:0.6;margin-top:3px;">📵 শুধু এই ডিভাইসে</div>`;
    uc.innerHTML = `<strong>👤 ${escapeHtml(APP.authRecord.username)}</strong><span class="logout-btn" id="logout-btn">লগ-আউট ↗</span>${syncBadge}`;
    document.getElementById('logout-btn').addEventListener('click', logout);
  }
  // Page
  const main = document.getElementById('main');
  switch(APP.view) {
    case 'dashboard':    main.innerHTML = pageDashboard(); break;
    case 'transactions': main.innerHTML = pageTransactions(); break;
    case 'report':       main.innerHTML = pageReport(); break;
    case 'dues':         main.innerHTML = pageDues(); break;
    case 'bkash':        main.innerHTML = pageBkash(); break;
    case 'accounts':     main.innerHTML = pageAccounts(); break;
  }
  bindEvents();
}

    <tbody>
      ${list.map(d=>{
        const rem = dueRemaining(d);

        const hasPhone = !!(d.phone && d.phone.trim());

          <td>${escapeHtml(d.date)}</td>
          <td><strong>${escapeHtml(d.customer)}</strong></td>
          <td>${hasPhone ? escapeHtml(d.phone) : '—'}</td>

          <td style="white-space:nowrap;text-align:center;">

        </tr>`;
      }).join('')}
    </tbody>
  </table></div>`;
}

function bkashTxTable(list) {
  if(!list.length) return `<div class="empty-state"><div class="empty-icon">📭</div>কোনো লেনদেন নেই</div>`;
  return `<div class="table-wrap"><table>
    <thead><tr>
      <th>তারিখ ও সময়</th><th>ধরন</th><th>বিবরণ</th>
      <th style="text-align:right;">পরিমাণ</th><th style="text-align:center;">ক্রিয়া</th>
    </tr></thead>
    <tbody>
      ${list.map(t=>`<tr>
        <td>${escapeHtml(t.date)}${t.time?` <span style="opacity:0.6;">— ${formatTime12(t.time)}</span>`:''}</td>
        <td>${t.type==='expense'?'<span class="tag warning">📉 খরচ</span>':'<span class="tag success">📈 আয়/পরিশোধ</span>'}</td>
        <td>${escapeHtml(t.category||t.note||'—')}</td>
        <td style="text-align:right;font-weight:700;color:${t.type==='expense'?'var(--warning)':'var(--success)'};">${fmt(t.amount)}</td>
        <td style="text-align:center;"><button class="btn btn-danger btn-small del-bkash-tx" data-id="${t.id}">মুছুন</button></td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

function groupByDate(list) {
  const groups = {};
  list.forEach(t => { if(!groups[t.date]) groups[t.date]=[]; groups[t.date].push(t); });
  return Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(date=>({date,items:groups[date]}));
}

function monthLabel(str) {
  const [y,m] = str.split('-').map(Number);
  return new Date(y, m-1, 1).toLocaleDateString('bn-BD', {month:'long', year:'numeric'});
}

// ============================================================
// EVENT BINDING — called after every render()
// ============================================================
function bindEvents() {
  // Nav
  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => { APP.view = el.dataset.view; render(); });
  });

  // Tab buttons
  const tabAll = document.getElementById('tab-all');
  const tabDaily = document.getElementById('tab-daily');
  const tabMonthly = document.getElementById('tab-monthly');
  if(tabAll) tabAll.addEventListener('click', () => { APP.txViewMode='all'; render(); });
  if(tabDaily) tabDaily.addEventListener('click', () => { APP.txViewMode='daily'; render(); });
  if(tabMonthly) tabMonthly.addEventListener('click', () => { APP.txViewMode='monthly'; render(); });

  // Type toggle
  const ti = document.getElementById('toggle-income');
  const te = document.getElementById('toggle-expense');
  if(ti) ti.addEventListener('click', () => { APP.txType='income'; ti.classList.add('active'); if(te) te.classList.remove('active'); });
  if(te) te.addEventListener('click', () => { APP.txType='expense'; te.classList.add('active'); if(ti) ti.classList.remove('active'); });

  // Add transaction
  const txSubmit = document.getElementById('tx-submit');
  if(txSubmit) {
    txSubmit.addEventListener('click', () => {
      const amtRaw = document.getElementById('tx-amount').value;
      const amount = parseFloat(amtRaw);
      const accountId = document.getElementById('tx-account').value;
      const category = document.getElementById('tx-category').value.trim();
      const date = document.getElementById('tx-date').value || todayStr();
      const time = document.getElementById('tx-time').value || nowTimeStr();
      const note = document.getElementById('tx-note').value.trim();

      if(!amount || amount <= 0) { showToast('সঠিক পরিমাণ লিখুন', 'error'); return; }
      if(!accountId) { showToast('হিসাব নির্বাচন করুন', 'error'); return; }

      APP.state.transactions.push({ id: uid(), type: APP.txType, amount, accountId, category, date, time, note });
      const saved = saveUserData();
      if(saved) showToast(APP.txType === 'income' ? '✓ আয় যোগ হয়েছে' : '✓ খরচ যোগ হয়েছে');
      render();
    });
  }

  // Delete transaction
  document.querySelectorAll('.del-tx').forEach(b => {
    b.addEventListener('click', () => {
      APP.state.transactions = APP.state.transactions.filter(t => t.id !== b.dataset.id);
      saveUserData();
      showToast('লেনদেন মুছে গেছে');
      render();
    });
  });

  // বিকাশ বক্স — সব বিকাশ লেনদেন পেইজে যাওয়ার বাটন
  const gotoBkash = document.getElementById('goto-bkash-page');
  if(gotoBkash) {
    gotoBkash.addEventListener('click', () => { APP.view = 'bkash'; render(); });
  }

  // Add account
  const acctSubmit = document.getElementById('acct-submit');
  if(acctSubmit) {
    acctSubmit.addEventListener('click', () => {
      const name = document.getElementById('acct-name').value.trim();
      const type = document.getElementById('acct-type').value;
      const opening = parseFloat(document.getElementById('acct-opening').value) || 0;
      if(!name) { showToast('হিসাবের নাম লিখুন', 'error'); return; }
      APP.state.accounts.push({ id: uid(), name, type, opening });
      saveUserData();
      showToast('✓ হিসাব যোগ হয়েছে');
      render();
    });
  }

  // Delete account
  document.querySelectorAll('.del-acct').forEach(b => {
    b.addEventListener('click', () => {
      const id = b.dataset.id;
      const hasTx = APP.state.transactions.some(t => t.accountId === id);
      if(hasTx && !confirm('এই হিসাবে লেনদেন আছে। মুছবেন?')) return;
      APP.state.accounts = APP.state.accounts.filter(a => a.id !== id);
      APP.state.transactions = APP.state.transactions.filter(t => t.accountId !== id);
      saveUserData();
      showToast('হিসাব মুছে গেছে');
      render();
    });
  });

  // Password change
  const pwSubmit = document.getElementById('pw-submit');
  if(pwSubmit) {
    pwSubmit.addEventListener('click', async () => {
      const msg = document.getElementById('pw-msg');
      const cur = document.getElementById('pw-current').value;
      const nw = document.getElementById('pw-new').value;
      const cn = document.getElementById('pw-confirm').value;
      if(await sha256(cur) !== APP.authRecord.hash) { msg.innerHTML = '❌ বর্তমান পাসওয়ার্ড ভুল'; msg.style.color='var(--danger)'; return; }
      if(nw.length < 4) { msg.innerHTML = '❌ নতুন পাসওয়ার্ড কমপক্ষে ৪ অক্ষর'; msg.style.color='var(--danger)'; return; }
      if(nw !== cn) { msg.innerHTML = '❌ পাসওয়ার্ড মিলছে না'; msg.style.color='var(--danger)'; return; }
      APP.authRecord.hash = await sha256(nw);
      saveAuth();
      if(CLOUD_ENABLED) cloudUpdateHash(APP.authRecord.hash);
      msg.innerHTML = '✓ পাসওয়ার্ড আপডেট হয়েছে'; msg.style.color='var(--success)';
      ['pw-current','pw-new','pw-confirm'].forEach(id => document.getElementById(id).value='');
      setTimeout(() => msg.innerHTML='', 3000);
    });
  }

  // Reset data
  const resetBtn = document.getElementById('reset-data');
  if(resetBtn) {
    resetBtn.addEventListener('click', () => {
      if(!confirm('সব ডাটা মুছে যাবে! এগিয়ে যাবেন?')) return;
      APP.state = { accounts: [{id:uid(), name:'ক্যাশ কাউন্টার', type:'নগদ', opening:0}], transactions: [], dues: [], bkash: [] };
      saveUserData();
      showToast('ডাটা রিসেট হয়েছে');
      render();
    });
  }

  // Report month
  const rm = document.getElementById('report-month');
  if(rm) rm.addEventListener('change', () => { APP.reportMonth = rm.value || APP.reportMonth; render(); });

  // Print
  const pb = document.getElementById('print-btn');
  if(pb) pb.addEventListener('click', () => window.print());

  // Add due
  const dueSubmit = document.getElementById('due-submit');
  if(dueSubmit) {
    dueSubmit.addEventListener('click', () => {
      const customer = document.getElementById('due-customer').value.trim();
      const phone = document.getElementById('due-phone').value.trim();
      const service = document.getElementById('due-service').value;
      const total = parseFloat(document.getElementById('due-total').value);
      const paidNow = parseFloat(document.getElementById('due-paid').value) || 0;
      const date = document.getElementById('due-date').value || todayStr();
      const note = document.getElementById('due-note').value.trim();
      if(!customer) { showToast('গ্রাহকের নাম লিখুন', 'error'); return; }
      if(!total || total <= 0) { showToast('মোট পরিমাণ লিখুন', 'error'); return; }
      const paidEntries = paidNow > 0 ? [{amount: paidNow, date}] : [];
      const newDue = { id: uid(), customer, phone, service, total, paidEntries, date, note };
      APP.state.dues.push(newDue);
      saveUserData();
      showToast('✓ বাকি এন্ট্রি যোগ হয়েছে');
      render();
      if(phone && dueRemaining(newDue) > 0 && confirm(`"${customer}" (${phone}) হোয়াটসঅ্যাপে বাকির নোটিফিকেশন পাঠাবেন?`)) {
        sendWhatsApp(newDue);
      }
    });
  }

  // Pay due
  document.querySelectorAll('.pay-due').forEach(b => {
    b.addEventListener('click', () => {
      const d = APP.state.dues.find(x => x.id === b.dataset.id);
      if(!d) return;
      const rem = dueRemaining(d);
      const amtStr = prompt(`${d.customer} — বাকি ${fmt(rem)}\nকত টাকা পরিশোধ হচ্ছে?`, rem.toFixed(2));
      if(amtStr === null) return;
      const amt = parseFloat(amtStr);
      if(!amt || amt <= 0) { showToast('সঠিক পরিমাণ লিখুন', 'error'); return; }
      d.paidEntries = d.paidEntries || [];
      d.paidEntries.push({ amount: amt, date: todayStr() });
      saveUserData();
      showToast('✓ পরিশোধ রেকর্ড হয়েছে');
      render();
    });
  });

  // WhatsApp
  document.querySelectorAll('.wa-due').forEach(b => {
    b.addEventListener('click', () => {
      const d = APP.state.dues.find(x => x.id === b.dataset.id);
      sendWhatsApp(d);
    });
  });

  // Delete due
  document.querySelectorAll('.del-due').forEach(b => {
    b.addEventListener('click', () => {
      if(!confirm('বাকি এন্ট্রি মুছবেন?')) return;
      APP.state.dues = APP.state.dues.filter(d => d.id !== b.dataset.id);
      saveUserData();
      showToast('বাকি এন্ট্রি মুছে গেছে');
      render();
    });
  });

  // বিকাশ হিসাব পেইজ — ধরন টগল
  const bkTi = document.getElementById('bk-toggle-income');
  const bkTe = document.getElementById('bk-toggle-expense');
  if(bkTi) bkTi.addEventListener('click', () => { APP.bkTxType='income'; bkTi.classList.add('active'); if(bkTe) bkTe.classList.remove('active'); });
  if(bkTe) bkTe.addEventListener('click', () => { APP.bkTxType='expense'; bkTe.classList.add('active'); if(bkTi) bkTi.classList.remove('active'); });

  // Add bKash transaction (with time)
  const bkSubmit = document.getElementById('bk-submit');
  if(bkSubmit) {
    bkSubmit.addEventListener('click', () => {
      const amount = parseFloat(document.getElementById('bk-amount').value);
      const date = document.getElementById('bk-date').value || todayStr();
      const time = document.getElementById('bk-time').value || nowTimeStr();
      const note = document.getElementById('bk-note').value.trim();
      if(!amount || amount <= 0) { showToast('সঠিক পরিমাণ লিখুন', 'error'); return; }
      const accountId = ensureBkashAccount();
      const category = APP.bkTxType === 'expense' ? 'বিকাশ খরচ' : 'বিকাশ পরিশোধ';
      APP.state.transactions.push({ id: uid(), type: APP.bkTxType, amount, accountId, category, date, time, note });
      const saved = saveUserData();
      if(saved) showToast(APP.bkTxType === 'expense' ? '✓ বিকাশ খরচ যোগ হয়েছে' : '✓ বিকাশ পরিশোধ/আয় যোগ হয়েছে');
      render();
    });
  }

  // Delete bKash transaction
  document.querySelectorAll('.del-bkash-tx').forEach(b => {
    b.addEventListener('click', () => {
      if(!confirm('লেনদেনটি মুছবেন?')) return;
      APP.state.transactions = APP.state.transactions.filter(x => x.id !== b.dataset.id);
      saveUserData();
      showToast('লেনদেন মুছে গেছে');
      render();
    });
  });
}

let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const btn = document.getElementById('install-app-btn');
  if(btn) btn.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  const btn = document.getElementById('install-app-btn');
  if(btn) btn.style.display = 'none';
  showToast('✓ অ্যাপ ইনস্টল হয়েছে');
});
const installBtn = document.getElementById('install-app-btn');
if(installBtn) {
  installBtn.addEventListener('click', async () => {
    if(!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    installBtn.style.display = 'none';
  });
}

// ============================================================
// INIT
// ============================================================
function init() {
  initCloud();
  setTimeout(() => {
    loadAuth();
    document.getElementById('loadingOverlay').classList.add('hidden');
    if(!APP.authRecord && !CLOUD_ENABLED) {
      showSetup();
    } else {
      showLogin();
    }
  }, 1200);
}

init();
</script>
